server:
  port: 8082

spring:
  application:
    name: aurora-notification-service

  kafka:
    bootstrap-servers: ${APP_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: aurora-notification-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

  mail:
    host: ${APP_MAIL_HOST:localhost}
    port: ${APP_MAIL_PORT:1025}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

app:
  notification:
    from: ${APP_NOTIFICATION_FROM:Aurora Marketplace <no-reply@aurora.dev>}
