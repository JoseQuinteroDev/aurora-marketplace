server:
  port: 8082

spring:
  application:
    name: aurora-notification-service

  kafka:
    bootstrap-servers: ${APP_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: aurora-notification-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

  mail:
    host: ${APP_MAIL_HOST:localhost}
    port: ${APP_MAIL_PORT:1025}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

management:
  endpoints:
    web:
      # No Spring Security guards this actuator, so keep the public surface minimal
      # (consistent with the gateway): expose only health,info,prometheus.
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      # Consistent with the core: don't disclose per-component health to anonymous
      # callers. No Spring Security guards this actuator, so without an authenticated
      # principal this resolves to status-only (UP/DOWN) — the component breakdown
      # stays private rather than being shown to everyone.
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

app:
  notification:
    from: ${APP_NOTIFICATION_FROM:Aurora Marketplace <no-reply@aurora.dev>}
    email:
      # smtp = local Mailpit (dev). api = HTTP provider (e.g. Resend) — set the key.
      provider: ${APP_NOTIFICATION_EMAIL_PROVIDER:smtp}
      api:
        base-url: ${APP_NOTIFICATION_EMAIL_API_BASE_URL:https://api.resend.com}
        key: ${APP_NOTIFICATION_EMAIL_API_KEY:}
    sms:
      # log = write the SMS to the log (dev). twilio = send via Twilio — set sid + token.
      enabled: ${APP_NOTIFICATION_SMS_ENABLED:true}
      provider: ${APP_NOTIFICATION_SMS_PROVIDER:log}
      from: ${APP_NOTIFICATION_SMS_FROM:Aurora}
      twilio:
        base-url: ${APP_NOTIFICATION_SMS_TWILIO_BASE_URL:https://api.twilio.com}
        account-sid: ${APP_NOTIFICATION_SMS_TWILIO_ACCOUNT_SID:}
        auth-token: ${APP_NOTIFICATION_SMS_TWILIO_AUTH_TOKEN:}

  # Consumer resilience: transient failures are retried with exponential backoff;
  # exhausted/poison records are routed to "<topic>.DLT".
  consumer:
    retry:
      attempts: ${APP_CONSUMER_RETRY_ATTEMPTS:3}
      initial-interval-ms: ${APP_CONSUMER_RETRY_INITIAL_MS:1000}
      multiplier: ${APP_CONSUMER_RETRY_MULTIPLIER:2.0}
      max-interval-ms: ${APP_CONSUMER_RETRY_MAX_MS:10000}
