services:
  postgres:
    image: postgres:16
    container_name: aurora_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aurora_marketplace
      POSTGRES_USER: aurora_user
      POSTGRES_PASSWORD: aurora_password
    ports:
      - "5433:5432"
    volumes:
      - aurora_postgres_data:/var/lib/postgresql/data
    networks:
      - aurora_network

  redis:
    image: redis:7-alpine
    container_name: aurora_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - aurora_network

  minio:
    image: minio/minio:latest
    container_name: aurora_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: aurora_minio
      MINIO_ROOT_PASSWORD: aurora_minio_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - aurora_minio_data:/data
    networks:
      - aurora_network

  mailpit:
    image: axllent/mailpit:latest
    container_name: aurora_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - aurora_network

  # Event backbone for the event-driven architecture (KRaft mode, no ZooKeeper).
  # Host apps connect via localhost:29092; in-network services via kafka:9092.
  kafka:
    image: apache/kafka:3.9.0
    container_name: aurora_kafka
    restart: unless-stopped
    ports:
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - aurora_network

  # Web console to inspect topics, events and consumer groups.
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: aurora_kafka_ui
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - "8081:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: aurora-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: "true"
    networks:
      - aurora_network

volumes:
  aurora_postgres_data:
  aurora_minio_data:

networks:
  aurora_network:
    driver: bridge
