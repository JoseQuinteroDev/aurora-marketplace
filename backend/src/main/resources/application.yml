spring:
  application:
    name: aurora-marketplace-backend

  docker:
    compose:
      enabled: false

  datasource:
    url: jdbc:postgresql://localhost:5433/aurora_marketplace
    username: aurora_user
    password: aurora_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG

app:
  security:
    jwt:
      # Development default only. Override APP_SECURITY_JWT_SECRET in production.
      secret: ${APP_SECURITY_JWT_SECRET:aurora-marketplace-development-secret-change-me-before-production-1234567890}
      expiration-minutes: ${APP_SECURITY_JWT_EXPIRATION_MINUTES:60}

  batch:
    files:
      import-products: ${APP_BATCH_IMPORT_PRODUCTS_FILE:data/import/products.csv}
      sync-inventory: ${APP_BATCH_SYNC_INVENTORY_FILE:data/import/inventory.csv}
    clean-abandoned-carts:
      retention-hours: ${APP_BATCH_ABANDONED_CART_RETENTION_HOURS:24}
