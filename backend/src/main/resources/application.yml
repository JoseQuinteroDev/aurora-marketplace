spring:
  application:
    name: aurora-marketplace-backend

  docker:
    compose:
      enabled: false

  datasource:
    url: jdbc:postgresql://localhost:5433/aurora_marketplace
    username: aurora_user
    password: aurora_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
