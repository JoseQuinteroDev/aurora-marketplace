spring:
  application:
    name: aurora-marketplace-backend

  # Let in-flight requests/jobs finish (up to this budget) when SIGTERM arrives, instead of
  # being cut off — pairs with server.shutdown: graceful for zero-drop rolling deploys.
  lifecycle:
    timeout-per-shutdown-phase: 25s

  docker:
    compose:
      enabled: false

  datasource:
    # Dev defaults keep local runs zero-config; override every one of these via env in any
    # deployed environment (OWASP A02/A05 — no committed DB credentials). The 'prod' profile
    # (application-prod.yml) drops the defaults so a missing credential fails fast at startup.
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/aurora_marketplace}
    username: ${SPRING_DATASOURCE_USERNAME:aurora_user}
    password: ${SPRING_DATASOURCE_PASSWORD:aurora_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false

  kafka:
    bootstrap-servers: ${APP_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    producer:
      # Events are serialized to JSON up-front and stored in the outbox, so the
      # relay sends ready-made JSON strings (no JsonSerializer double-encoding).
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      properties:
        max.block.ms: 5000
        delivery.timeout.ms: 8000
        request.timeout.ms: 4000

server:
  port: 8080
  # Drain in-flight requests on shutdown rather than dropping them (OWASP A-availability / prod-readiness).
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      # Don't disclose per-component health (DB/disk/etc.) to anonymous callers — the
      # gateway proxies /core-actuator/** unauthenticated. Status (UP/DOWN) is always
      # shown; the component breakdown only to an authenticated ADMIN.
      show-details: when-authorized
      roles: ADMIN
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0

logging:
  level:
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
  pattern:
    # Surface trace/span ids so a request can be followed across services.
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

app:
  security:
    jwt:
      # Development default only. Override APP_SECURITY_JWT_SECRET in production.
      secret: ${APP_SECURITY_JWT_SECRET:aurora-marketplace-development-secret-change-me-before-production-1234567890}
      # Short-lived access token (OWASP A07): refresh-token rotation keeps sessions
      # alive, so the access token can be brief — limiting the blast radius of a leak.
      expiration-minutes: ${APP_SECURITY_JWT_EXPIRATION_MINUTES:15}
    login:
      # Per-account brute-force lockout (OWASP A07): after this many consecutive
      # failed logins, the account is locked for lock-duration-minutes. Enforced
      # in the core (not just the gateway), so it holds regardless of ingress.
      max-failed-attempts: ${APP_SECURITY_LOGIN_MAX_FAILED_ATTEMPTS:5}
      lock-duration-minutes: ${APP_SECURITY_LOGIN_LOCK_DURATION_MINUTES:15}
    breached-password:
      # Credential hygiene (OWASP A07): reject a chosen password (register / reset) that
      # appears in the Have I Been Pwned "Pwned Passwords" corpus. Uses k-anonymity — only
      # the first 5 hex chars of the password's SHA-1 leave the process. Fails OPEN if the
      # corpus is unreachable (availability > strictness). Disable for air-gapped envs.
      enabled: ${APP_SECURITY_BREACHED_PASSWORD_ENABLED:true}
      api-base-url: ${APP_SECURITY_BREACHED_PASSWORD_API_BASE_URL:https://api.pwnedpasswords.com}
      timeout-ms: ${APP_SECURITY_BREACHED_PASSWORD_TIMEOUT_MS:2500}
    refresh-token:
      # Refresh-token rotation with reuse detection (OWASP A07). Opaque tokens,
      # SHA-256-at-rest, single-use; a benign double-submit within grace-seconds is
      # idempotent, a later replay revokes the whole token family.
      expiration-days: ${APP_SECURITY_REFRESH_TOKEN_EXPIRATION_DAYS:30}
      grace-seconds: ${APP_SECURITY_REFRESH_TOKEN_GRACE_SECONDS:10}
      purge-delay-ms: ${APP_SECURITY_REFRESH_TOKEN_PURGE_DELAY_MS:3600000}
    mfa:
      # Optional, opt-in TOTP second factor (OWASP A07). The encryption-key (base64 AES key,
      # 16/24/32 bytes) encrypts each user's TOTP secret at rest. Development default ONLY —
      # override APP_SECURITY_MFA_ENCRYPTION_KEY in production. MfaKeyValidator additionally
      # refuses to start under the 'prod' profile on this known placeholder (like the JWT secret).
      encryption-key: ${APP_SECURITY_MFA_ENCRYPTION_KEY:ZGV2LW9ubHktaW5zZWN1cmUtbWZhLWtleS0zMmJ5dGU=}
      # Label shown in authenticator apps and embedded in the otpauth:// provisioning URI.
      issuer: ${APP_SECURITY_MFA_ISSUER:Aurora Marketplace}

  events:
    # When true, domain events are recorded to the transactional outbox and then
    # relayed to Kafka. A broker outage never breaks checkout or payment: events
    # simply stay PENDING in the outbox until the broker is reachable again.
    enabled: ${APP_EVENTS_ENABLED:true}
    # How long the relay waits for a broker ack before treating a send as failed.
    send-timeout-ms: ${APP_EVENTS_SEND_TIMEOUT_MS:8000}

  outbox:
    relay:
      # Delay between relay sweeps that drain PENDING outbox rows to Kafka.
      fixed-delay-ms: ${APP_OUTBOX_RELAY_FIXED_DELAY_MS:2000}
      # Rows claimed per sweep.
      batch-size: ${APP_OUTBOX_RELAY_BATCH_SIZE:100}
      # Send attempts before a row is parked as FAILED for inspection.
      max-attempts: ${APP_OUTBOX_RELAY_MAX_ATTEMPTS:10}
    purge:
      # Periodically delete already-PUBLISHED rows: prevents unbounded table growth and bounds
      # how long an event payload's sensitive cleartext (reset/verification token) lingers in the
      # DB after delivery (OWASP A07 residual). PENDING/FAILED rows are never purged.
      enabled: ${APP_OUTBOX_PURGE_ENABLED:true}
      retention-minutes: ${APP_OUTBOX_PURGE_RETENTION_MINUTES:60}
      fixed-delay-ms: ${APP_OUTBOX_PURGE_FIXED_DELAY_MS:900000}

  batch:
    files:
      import-products: ${APP_BATCH_IMPORT_PRODUCTS_FILE:data/import/products.csv}
      sync-inventory: ${APP_BATCH_SYNC_INVENTORY_FILE:data/import/inventory.csv}
    clean-abandoned-carts:
      retention-hours: ${APP_BATCH_ABANDONED_CART_RETENTION_HOURS:24}
