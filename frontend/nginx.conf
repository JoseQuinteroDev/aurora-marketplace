# Server block for the Angular SPA (mounted at /etc/nginx/conf.d/default.conf).
# nginx-unprivileged listens on 8080 as a non-root user.
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Don't leak the nginx version.
    server_tokens off;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/manifest+json;

    # Security headers for the static origin (the JSON API enforces its own on the core/gateway).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;
    # SPA-appropriate CSP. Angular ships a small inline theme/no-flash script + inline styles, hence
    # 'unsafe-inline' here; tighten to nonces/hashes if those are removed. API calls are same-origin
    # (proxied through the gateway), images allow the remote hero/CDN.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # Long-cache hashed build assets (filenames carry a content hash → safe to cache immutably).
    location ~* \.(?:js|css|woff2?|ttf|eot|otf|svg|png|jpe?g|gif|webp|avif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA history fallback: every non-asset route returns index.html (never cached, so deploys are picked up).
    location / {
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }
}
