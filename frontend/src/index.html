<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Aurora Marketplace — Tecnología, audio y hogar conectado</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Aurora Marketplace: tecnología, audio y hogar conectado. Envío en 24-48h, devolución gratis en 30 días y pago cifrado.">
  <meta name="theme-color" content="#0f172a">
  <meta property="og:title" content="Aurora Marketplace">
  <meta property="og:description" content="Tecnología, audio y hogar conectado. Envío en 24-48h, devolución gratis y pago cifrado.">
  <meta property="og:type" content="website">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script>
    // Apply the saved/preferred theme before first paint to avoid a flash of the wrong theme.
    (function () {
      try {
        var t = localStorage.getItem('aurora-theme');
        if (t !== 'light' && t !== 'dark') {
          t = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        if (t === 'dark') { document.documentElement.classList.add('dark'); }
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
