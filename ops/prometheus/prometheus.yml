# Scrapes each Aurora service's Spring Boot Actuator Prometheus endpoint.
# Targets use the in-network service hostnames from docker-compose (apps profile).
# The core permits /actuator/prometheus anonymously; gateway + notification have no auth on it.
global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: aurora-backend
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["backend:8080"]
        labels:
          service: backend

  - job_name: aurora-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["gateway:8088"]
        labels:
          service: gateway

  - job_name: aurora-notification-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["notification-service:8082"]
        labels:
          service: notification-service

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
