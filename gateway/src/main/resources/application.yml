server:
  port: 8088

spring:
  application:
    name: aurora-gateway

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  cloud:
    gateway:
      # CORS allow-list, driven PER ENVIRONMENT. The Angular storefront talks to the
      # platform through this single origin (the gateway). The dev default is the local
      # ng-serve origin; in PRODUCTION set GATEWAY_ALLOWED_ORIGINS to the exact storefront
      # origin(s) — e.g. "https://app.aurora.example" — never a wildcard. Because
      # allow-credentials is true, a "*" origin is intentionally impossible (the browser
      # rejects a credentialed wildcard, and we never reflect arbitrary origins).
      # Comma-separated; bound to the allowed-origin-patterns list.
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origin-patterns: "${GATEWAY_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}"
            allowed-methods: "${GATEWAY_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}"
            allowed-headers: "${GATEWAY_ALLOWED_HEADERS:Authorization,Content-Type,Accept,Origin,X-Requested-With,Idempotency-Key,X-Retried}"
            allow-credentials: true
            max-age: 3600

      # Applied to every route: dedupe CORS headers and throttle per client IP
      # using a Redis-backed token bucket shared across gateway instances.
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials
        - name: RequestRateLimiter
          args:
            key-resolver: "#{@clientIpKeyResolver}"
            redis-rate-limiter.replenishRate: ${RATE_LIMIT_REPLENISH:20}
            redis-rate-limiter.burstCapacity: ${RATE_LIMIT_BURST:40}
            redis-rate-limiter.requestedTokens: 1

      routes:
        # Notification service read API. Declared before the core catch-all so
        # /api/notifications/** is routed here, not to the commerce core.
        - id: aurora-notifications-api
          uri: ${NOTIFICATION_URI:http://localhost:8082}
          predicates:
            - Path=/api/notifications/**
          filters:
            - name: CircuitBreaker
              args:
                name: notificationApiCircuitBreaker
                fallbackUri: forward:/fallback/notifications
            - name: Retry
              args:
                retries: 2
                methods: GET
                series: SERVER_ERROR

        # Tighter throttle for the unauthenticated password-reset request, so a known
        # address can't be email-bombed. Declared before the /api/** catch-all; the
        # core also enforces a per-account interval as a gateway-bypass backstop.
        - id: aurora-forgot-password
          uri: ${BACKEND_URI:http://localhost:8080}
          predicates:
            - Path=/api/auth/forgot-password
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@clientIpKeyResolver}"
                redis-rate-limiter.replenishRate: ${FORGOT_PASSWORD_RATE_REPLENISH:1}
                redis-rate-limiter.burstCapacity: ${FORGOT_PASSWORD_RATE_BURST:3}
                redis-rate-limiter.requestedTokens: 1
            - name: CircuitBreaker
              args:
                name: coreApiCircuitBreaker
                fallbackUri: forward:/fallback/core

        # Tighter throttle for the unauthenticated resend-verification request (same
        # email-bombing surface as forgot-password). Declared before the /api/** catch-all.
        - id: aurora-resend-verification
          uri: ${BACKEND_URI:http://localhost:8080}
          predicates:
            - Path=/api/auth/resend-verification
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@clientIpKeyResolver}"
                redis-rate-limiter.replenishRate: ${RESEND_VERIFICATION_RATE_REPLENISH:1}
                redis-rate-limiter.burstCapacity: ${RESEND_VERIFICATION_RATE_BURST:3}
                redis-rate-limiter.requestedTokens: 1
            - name: CircuitBreaker
              args:
                name: coreApiCircuitBreaker
                fallbackUri: forward:/fallback/core

        # Stricter throttle for the rest of the auth surface (login, register, refresh,
        # reset-password, verify-email, revoke). Tighter than the global per-IP bucket so a
        # single IP can't password-spray or spam account creation; the per-account lockout
        # (core) remains the non-bypassable backstop against distributed attempts. Declared
        # after the two email-bomb routes (more specific) and before the /api/** catch-all.
        - id: aurora-auth-api
          uri: ${BACKEND_URI:http://localhost:8080}
          predicates:
            - Path=/api/auth/**
          filters:
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@clientIpKeyResolver}"
                redis-rate-limiter.replenishRate: ${AUTH_RATE_REPLENISH:5}
                redis-rate-limiter.burstCapacity: ${AUTH_RATE_BURST:20}
                redis-rate-limiter.requestedTokens: 1
            - name: CircuitBreaker
              args:
                name: coreApiCircuitBreaker
                fallbackUri: forward:/fallback/core

        # Core commerce service (catalog, cart, checkout, orders, payments, admin).
        - id: aurora-core-api
          uri: ${BACKEND_URI:http://localhost:8080}
          predicates:
            - Path=/api/**
          filters:
            - name: CircuitBreaker
              args:
                name: coreApiCircuitBreaker
                fallbackUri: forward:/fallback/core
            - name: Retry
              args:
                retries: 2
                # Only safe (idempotent) reads are retried automatically.
                methods: GET
                series: SERVER_ERROR

        # Core actuator surface, namespaced behind the gateway.
        - id: aurora-core-actuator
          uri: ${BACKEND_URI:http://localhost:8080}
          predicates:
            - Path=/core-actuator/**
          filters:
            - RewritePath=/core-actuator/(?<segment>.*), /actuator/$\{segment}

# Per-call latency ceiling: if the core takes longer than this, the circuit
# breaker trips and the request is sent to the fallback instead of hanging.
resilience4j:
  timelimiter:
    configs:
      default:
        timeout-duration: ${GATEWAY_TIMEOUT:5s}
        cancel-running-future: true
    instances:
      coreApiCircuitBreaker:
        base-config: default
      notificationApiCircuitBreaker:
        base-config: default
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 20
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 5
    instances:
      coreApiCircuitBreaker:
        base-config: default
      notificationApiCircuitBreaker:
        base-config: default

management:
  endpoints:
    web:
      # The gateway runs no Spring Security in front of its own actuator, so keep
      # the public surface minimal: drop 'gateway' (it discloses the full route
      # topology — downstream URIs, predicates, filters) and 'metrics'.
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      # The gateway runs no Spring Security in front of its actuator, so it can never be
      # "authorized" — details are therefore never disclosed (only UP/DOWN status). Probes
      # still report liveness/readiness for the orchestrator.
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0

logging:
  level:
    org.springframework.cloud.gateway: INFO
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
